AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Forkless Service — Multi-tenant serverless three-layer AI stack

Parameters:
  ClaudeApiKey:
    Type: String
    NoEcho: true
  JwtSecret:
    Type: String
    NoEcho: true
  SesFromEmail:
    Type: String
    Default: support@agentintake.io
  CertificateArn:
    Type: String
    Default: ''
  HostedZoneId:
    Type: String
    Default: ''
    Description: Route 53 hosted zone ID for chat subdomain
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, prod]

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        ANTHROPIC_API_KEY: !Ref ClaudeApiKey
        JWT_SECRET: !Ref JwtSecret
        SES_FROM_EMAIL: !Ref SesFromEmail
        TABLE_PREFIX: forkless
        FORKLESS_STORAGE: dynamodb
        STAGE: !Ref Stage
        WS_ENDPOINT: !Sub 'https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
        WIDGET_BUCKET: !Ref WidgetBucket
        CHAT_RATE_LIMIT: '50'

Resources:
  # ─── HTTP API ───────────────────────────────────────────
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

  # ─── Router Lambda (single entry point) ─────────────────
  RouterFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/router.handler
      CodeUri: .
      Timeout: 180
      MemorySize: 512
      FunctionUrlConfig:
        AuthType: NONE
      Environment:
        Variables:
          INTAKE_WORKER_ARN: !GetAtt IntakeWorkerFunction.Arn
          CHAT_STREAM_ARN: !GetAtt ChatStreamFunction.Arn
      Events:
        CatchAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TenantsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConversationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref BoardItemsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref BoardCommentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref BoardDecisionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref JourneyStatesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SchedulerEventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FaqCacheTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OtpTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ArtifactsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'
        - S3ReadPolicy:
            BucketName: !Ref WidgetBucket
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource:
                - !GetAtt IntakeWorkerFunction.Arn
                - !GetAtt ChatStreamFunction.Arn

  # ─── Intake Worker Lambda (async, no API Gateway) ──────
  IntakeWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/intake.handler
      CodeUri: .
      Timeout: 300
      MemorySize: 512
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TenantsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FaqCacheTable

  # ─── Chat Stream Worker (async, streams via WebSocket) ──
  ChatStreamFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/chat-stream.handler
      CodeUri: .
      Timeout: 180
      MemorySize: 512
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConversationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref TenantsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FaqCacheTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref BoardItemsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref BoardCommentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ArtifactsTable
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'

  # ─── Scheduler Lambda (EventBridge 5min) ────────────────
  SchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/scheduler.handler
      CodeUri: .
      Timeout: 60
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Enabled: true
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SchedulerEventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConversationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ArtifactsTable

  # ─── WebSocket API ──────────────────────────────────────
  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: forkless-ws
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: '$request.body.action'

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: !Ref Stage
      AutoDeploy: true

  WsConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/ws-connect.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable

  WsConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WsConnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com

  WsConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Sub 'integrations/${WsConnectIntegration}'

  WsConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsConnectFunction.Arn}/invocations'

  WsDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/ws-disconnect.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable

  WsDisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WsDisconnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com

  WsDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      Target: !Sub 'integrations/${WsDisconnectIntegration}'

  WsDisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsDisconnectFunction.Arn}/invocations'

  WsDefaultFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/ws-message.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'

  WsDefaultPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WsDefaultFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com

  WsDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $default
      Target: !Sub 'integrations/${WsDefaultIntegration}'

  WsDefaultIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsDefaultFunction.Arn}/invocations'

  # ─── CloudFront for chat.agentintake.io ─────────────────
  ChatDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: chat.agentintake.io → Lambda Function URL
        Aliases:
          - chat.agentintake.io
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: FunctionUrlOrigin
            DomainName: !Select [2, !Split ['/', !GetAtt RouterFunctionUrl.FunctionUrl]]
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              HTTPSPort: 443
              OriginReadTimeout: 60
              OriginKeepaliveTimeout: 60
        DefaultCacheBehavior:
          TargetOriginId: FunctionUrlOrigin
          ViewerProtocolPolicy: https-only
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          CachedMethods: [GET, HEAD]
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
        HttpVersion: http2

  ChatDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: chat.agentintake.io
      Type: A
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront global hosted zone ID
        DNSName: !GetAtt ChatDistribution.DomainName

  # ─── S3 Widget Bucket ──────────────────────────────────
  WidgetBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'forkless-widget-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  WidgetBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WidgetBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${WidgetBucket.Arn}/*'

  # ─── DynamoDB Tables ────────────────────────────────────

  TenantsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: forkless-tenants
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: tenant_id
          AttributeType: S
      KeySchema:
        - AttributeName: tenant_id
          KeyType: HASH

  ConversationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: forkless-conversations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: conversation_id
          AttributeType: S
      KeySchema:
        - AttributeName: tenant_id
          KeyType: HASH
        - AttributeName: conversation_id
          KeyType: RANGE

  BoardItemsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: forkless-board-items
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: item_id
          AttributeType: S
        - AttributeName: stage
          AttributeType: S
      KeySchema:
        - AttributeName: tenant_id
          KeyType: HASH
        - AttributeName: item_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: stage-index
          KeySchema:
            - AttributeName: tenant_id
              KeyType: HASH
            - AttributeName: stage
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  BoardCommentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: forkless-board-comments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: comment_id
          AttributeType: S
      KeySchema:
        - AttributeName: tenant_id
          KeyType: HASH
        - AttributeName: comment_id
          KeyType: RANGE

  BoardDecisionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: forkless-board-decisions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: decision_id
          AttributeType: S
      KeySchema:
        - AttributeName: tenant_id
          KeyType: HASH
        - AttributeName: decision_id
          KeyType: RANGE

  JourneyStatesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: forkless-journey-states
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: journey_id
          AttributeType: S
      KeySchema:
        - AttributeName: tenant_id
          KeyType: HASH
        - AttributeName: journey_id
          KeyType: RANGE

  SchedulerEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: forkless-scheduler-events
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: event_id
          AttributeType: S
        - AttributeName: fire_at
          AttributeType: S
      KeySchema:
        - AttributeName: tenant_id
          KeyType: HASH
        - AttributeName: event_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: fire-at-index
          KeySchema:
            - AttributeName: tenant_id
              KeyType: HASH
            - AttributeName: fire_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  FaqCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: forkless-faq-cache
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: question_hash
          AttributeType: S
      KeySchema:
        - AttributeName: tenant_id
          KeyType: HASH
        - AttributeName: question_hash
          KeyType: RANGE

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: forkless-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: tenant_id
          KeyType: HASH
        - AttributeName: email
          KeyType: RANGE

  OtpTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: forkless-otp
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: tenant_id
          KeyType: HASH
        - AttributeName: email
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  ArtifactsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: forkless-artifacts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: artifact_id
          AttributeType: S
      KeySchema:
        - AttributeName: tenant_id
          KeyType: HASH
        - AttributeName: artifact_id
          KeyType: RANGE

  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: forkless-connections
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connection_id
          AttributeType: S
      KeySchema:
        - AttributeName: connection_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

Outputs:
  ApiUrl:
    Description: HTTP API endpoint
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
  FunctionUrl:
    Description: Lambda Function URL (no timeout cap)
    Value: !GetAtt RouterFunctionUrl.FunctionUrl
  WebSocketUrl:
    Description: WebSocket endpoint
    Value: !Sub 'wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
  WidgetBucketName:
    Description: S3 bucket for widget files
    Value: !Ref WidgetBucket
  ChatUrl:
    Description: chat.agentintake.io CloudFront distribution
    Value: https://chat.agentintake.io
